<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Trek Canon Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Rajdhani', monospace;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      color: #e0e0ff;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2em;
      font-weight: 900;
      margin-bottom: 5px;
      color: #64b3ff;
      letter-spacing: 2px;
    }

    .progress-bar-container {
      width: 100%;
      height: 35px;
      background: rgba(20, 30, 60, 0.8);
      border: 2px solid #64b3ff;
      border-radius: 20px;
      margin: 15px 0;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(100, 150, 255, 0.3);
    }

    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.9em;
      font-weight: 600;
      z-index: 10;
      color: #fff;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin: 15px 0;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: linear-gradient(135deg, #64b3ff 0%, #4a9fff 100%);
      border: none;
      color: #fff;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Rajdhani', monospace;
      font-size: 0.8em;
      font-weight: 600;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(100, 150, 255, 0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(100, 150, 255, 0.5);
    }

    button.active {
      background: linear-gradient(135deg, #64b3ff 0%, #4a9fff 100%);
    }

    button.category-toggle:not(.active) {
      background: linear-gradient(135deg, #ff6464 0%, #dd4a4a 100%);
      box-shadow: 0 4px 15px rgba(255, 100, 100, 0.3);
    }

    button.category-toggle:not(.active):hover {
      box-shadow: 0 6px 20px rgba(255, 100, 100, 0.5);
    }

    .entry {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      background: transparent;
      border-left: none;
      border-bottom: 1px solid rgba(100, 150, 255, 0.2);
      border-radius: 0;
      transition: all 0.2s;
      cursor: pointer;
    }

    .entry:hover {
      background: rgba(50, 70, 120, 0.4);
      border-left: none;
      transform: none;
    }

    .entry.checked {
      background: rgba(0, 255, 136, 0.08);
      border-left: none;
    }

    .checkbox {
      width: 24px;
      height: 24px;
      border: 1.5px solid #64b3ff;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1em;
      transition: all 0.2s;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }

    .entry.checked .checkbox {
      background: #00ff88;
      border-color: #00ff88;
      color: #000;
      font-weight: 700;
    }

    .entry-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }

    .entry-title {
      font-size: 0.9em;
      font-weight: 500;
      color: #e0e0ff;
    }

    .entry-meta {
      font-size: 0.7em;
      color: #a0a0cc;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 2px;
      font-size: 0.65em;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .badge-film {
      background: rgba(255, 200, 0, 0.3);
      color: #ffd700;
      border: 0.5px solid #ffd700;
    }

    .badge-live {
      background: rgba(100, 180, 255, 0.3);
      color: #64b3ff;
      border: 0.5px solid #64b3ff;
    }

    .badge-animated {
      background: rgba(200, 100, 255, 0.3);
      color: #d088ff;
      border: 0.5px solid #d088ff;
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px 15px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(100, 150, 255, 0.5);
    }

    header p {
      font-size: 0.85em;
      color: #a0a0cc;
      margin-top: 5px;
    }

    .entries {
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(100, 150, 255, 0.3);
      border-radius: 4px;
      overflow: hidden;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(100, 150, 255, 0.3);
      color: #808099;
      font-size: 0.8em;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.5em;
      }

      header p {
        font-size: 0.75em;
      }

      .entry {
        grid-template-columns: 24px 1fr;
      }

      .checkbox {
        width: 22px;
        height: 22px;
        font-size: 0.9em;
      }

      .entry-title {
        font-size: 0.85em;
      }

      .entry-meta {
        font-size: 0.65em;
      }
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>

  <div class="container">
    <header>
      <h1>STAR TREK TRACKER</h1>
      <p style="font-size: 0.95em; color: #a0a0cc; margin-top: 10px;">All series & movies in release order</p>
    </header>

    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>

    <div class="controls">
      <button id="markAll">Mark All</button>
      <button id="clearAll">Clear All</button>
      <button id="toggleFilms" class="category-toggle active" data-category="film">Films</button>
      <button id="toggleTV" class="category-toggle active" data-category="live">TV</button>
      <button id="toggleAnimated" class="category-toggle active" data-category="animated">Animated</button>
    </div>

    <div class="entries" id="entries"></div>

    <footer>
      Star Trek: 1966–2025 | 60 years of exploring the final frontier
    </footer>
  </div>

  <script>
    // Starfield background
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = [];
    for (let i = 0; i < 200; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.5,
        opacity: Math.random() * 0.5 + 0.3,
        twinkle: Math.random() * 0.02 + 0.01
      });
    }

    function drawStars() {
      ctx.fillStyle = 'rgba(10, 14, 39, 0.3)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      stars.forEach(star => {
        star.opacity += (Math.random() - 0.5) * star.twinkle;
        star.opacity = Math.max(0.2, Math.min(0.8, star.opacity));

        ctx.fillStyle = `rgba(224, 224, 255, ${star.opacity})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
      });

      requestAnimationFrame(drawStars);
    }

    drawStars();
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Data
    const ENTRIES = [

      { id:'25', title:'The Next Generation – Season 4', type:'live', episodes: 26, release:'1990-09-24', era:'24th Century (TNG, DS9, Voyager)', relYear: 1990 },
      { id:'26', title:'The Next Generation – Season 5', type:'live', episodes: 26, release:'1991-09-23', era:'24th Century (TNG, DS9, Voyager)', relYear: 1991 },
      { id:'27', title:'The Next Generation – Season 6', type:'live', episodes: 26, release:'1992-09-21', era:'24th Century (TNG, DS9, Voyager)', relYear: 1992 },
      { id:'28', title:'The Next Generation – Season 7', type:'live', episodes: 24, release:'1993-09-20', era:'24th Century (TNG, DS9, Voyager)', relYear: 1993 },

      // Deep Space Nine (overlaps with TNG end, TNG movies)

      { id:'30', title:'Deep Space Nine – Season 2', type:'live', episodes: 26, release:'1993-09-27', era:'24th Century (TNG, DS9, Voyager)', relYear: 1993 },
      { id:'31', title:'Deep Space Nine – Season 3', type:'live', episodes: 26, release:'1994-09-26', era:'24th Century (TNG, DS9, Voyager)', relYear: 1994 },
      { id:'32', title:'Deep Space Nine – Season 4', type:'live', episodes: 25, release:'1995-10-02', era:'24th Century (TNG, DS9, Voyager)', relYear: 1995 },

      { id:'34', title:'Deep Space Nine – Season 6', type:'live', episodes: 26, release:'1997-09-29', era:'24th Century (TNG, DS9, Voyager)', relYear: 1997 },
      { id:'35', title:'Deep Space Nine – Season 7', type:'live', episodes: 26, release:'1998-09-28', era:'24th Century (TNG, DS9, Voyager)', relYear: 1998 },

      // Voyager (overlaps with DS9 & TNG movies)
      { id:'36', title:'Voyager – Season 1', type:'live', episodes: 16, release:'1995-01-16', era:'24th Century (TNG, DS9, Voyager)', relYear: 1995 },
      { id:'37', title:'Voyager – Season 2', type:'live', episodes: 26, release:'1995-08-28', era:'24th Century (TNG, DS9, Voyager)', relYear: 1995 },

      { id:'43', title:'Star Trek: Generations', type:'film', episodes: 1, release:'1994-11-18', era:'24th Century (TNG, DS9, Voyager)', relYear: 1994 },
      { id:'44', title:'Star Trek: First Contact', type:'film', episodes: 1, release:'1996-11-22', era:'24th Century (TNG, DS9, Voyager)', relYear: 1996 },
      { id:'45', title:'Star Trek: Insurrection', type:'film', episodes: 1, release:'1998-11-22', era:'24th Century (TNG, DS9, Voyager)', relYear: 1998 },
      { id:'46', title:'Star Trek: Nemesis', type:'film', episodes: 1, release:'2002-12-13', era:'24th Century (TNG, DS9, Voyager)', relYear: 2002 },

      // Lower Decks (post-Nemesis)
      { id:'47', title:'Lower Decks – Season 1', type:'animated', episodes: 10, release:'2020-08-06', era:'24th Century (Post-Nemesis)', relYear: 2020 },
      { id:'48', title:'Lower Decks – Season 2', type:'animated', episodes: 10, release:'2021-08-12', era:'24th Century (Post-Nemesis)', relYear: 2021 },
      { id:'49', title:'Lower Decks – Season 3', type:'animated', episodes: 10, release:'2022-08-25', era:'24th Century (Post-Nemesis)', relYear: 2022 },
      { id:'50', title:'Lower Decks – Season 4', type:'animated', episodes: 10, release:'2023-09-07', era:'24th Century (Post-Nemesis)', relYear: 2023 },
      { id:'51', title:'Lower Decks – Season 5', type:'animated', episodes: 10, release:'2024-09-12', era:'24th Century (Post-Nemesis)', relYear: 2024 },

      // Prodigy (post-Voyager)
      { id:'52', title:'Prodigy – Season 1', type:'animated', episodes: 20, release:'2021-10-28', era:'24th Century (Post-Nemesis)', relYear: 2021 },
      { id:'53', title:'Prodigy – Season 2', type:'animated', episodes: 20, release:'2024-06-01', era:'24th Century (Post-Nemesis)', relYear: 2024 },

      // Picard (far future)
      { id:'54', title:'Picard – Season 1', type:'live', episodes: 10, release:'2020-01-23', era:'24th Century (Post-Nemesis)', relYear: 2020 },
      { id:'55', title:'Picard – Season 2', type:'live', episodes: 10, release:'2021-03-04', era:'24th Century (Post-Nemesis)', relYear: 2021 },
      { id:'56', title:'Picard – Season 3', type:'live', episodes: 10, release:'2023-02-16', era:'24th Century (Post-Nemesis)', relYear: 2023 },

      // Kelvin Timeline (alternate)
      { id:'57', title:'Star Trek (2009)', type:'film', episodes: 1, release:'2009-05-08', era:'Kelvin Timeline (Alternate Universe)', relYear: 2009 },
      { id:'58', title:'Star Trek Into Darkness', type:'film', episodes: 1, release:'2013-05-17', era:'Kelvin Timeline (Alternate Universe)', relYear: 2013 },
      { id:'59', title:'Star Trek Beyond', type:'film', episodes: 1, release:'2016-07-22', era:'Kelvin Timeline (Alternate Universe)', relYear: 2016 },

      // Discovery Far Future (finale)

      { id:'61', title:'Discovery – Season 4', type:'live', episodes: 13, release:'2021-11-04', era:'32nd Century (Discovery Far Future)', relYear: 2021 },
      { id:'62', title:'Discovery – Season 5', type:'live', episodes: 13, release:'2024-04-04', era:'32nd Century (Discovery Far Future)', relYear: 2024 },

      // Future Series
      { id:'63', title:'Section 31 (Film)', type:'film', episodes: 1, release:'2025-01-24', era:'24th Century (Post-Nemesis)', relYear: 2025 },
      { id:'64', title:'Starfleet Academy – Season 1', type:'live', episodes: 10, release:'2025', era:'24th Century (Post-Nemesis)', relYear: 2025 },
    ];

    const storageKey = 'trek_seen_v1';
    const categoryKey = 'trek_categories';
    let includedCategories = JSON.parse(localStorage.getItem(categoryKey) || '{"film":true,"live":true,"animated":true}');

    function loadState() {
      const stored = localStorage.getItem(storageKey);
      const state = stored ? JSON.parse(stored) : {};
      
      // Validate state - only keep entries that exist in ENTRIES
      const validIds = new Set(ENTRIES.map(e => e.id));
      const validState = {};
      Object.keys(state).forEach(id => {
        if (validIds.has(id)) {
          validState[id] = state[id];
        }
      });
      
      // Save cleaned state back
      if (Object.keys(state).length !== Object.keys(validState).length) {
        localStorage.setItem(storageKey, JSON.stringify(validState));
      }
      
      return validState;
    }

    function saveState(state) {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function renderEntries() {
      const container = document.getElementById('entries');
      const state = loadState();
      container.innerHTML = '';

      // Filter entries by included categories
      let visibleEntries = ENTRIES.filter(entry => {
        return includedCategories[entry.type];
      });

      // Sort by release year
      visibleEntries.sort((a, b) => a.relYear - b.relYear || ENTRIES.indexOf(a) - ENTRIES.indexOf(b));

      let checked = 0;

      visibleEntries.forEach(entry => {
        const isChecked = !!state[entry.id];
        if (isChecked) checked++;

        const div = document.createElement('div');
        div.className = `entry ${isChecked ? 'checked' : ''}`;
        div.dataset.id = entry.id;

        div.innerHTML = `
          <div class="checkbox">${isChecked ? '✓' : ''}</div>
          <div class="entry-info">
            <div class="entry-title">${entry.title}</div>
            <div class="entry-meta">
              <span class="badge badge-${entry.type}">${entry.type === 'live' ? 'TV' : entry.type.toUpperCase()}</span>
              <span>${entry.episodes} ${entry.episodes === 1 ? 'film' : 'episodes'}</span>
              <span style="color: #707088;">Released ${entry.release}</span>
            </div>
          </div>
          <div class="count"></div>
        `;

        div.addEventListener('click', () => toggleEntry(entry.id));
        container.appendChild(div);
      });

      updateProgress(checked);
    }

    function toggleEntry(id) {
      const state = loadState();
      state[id] = state[id] ? undefined : true;
      saveState(state);
      renderEntries();
    }

    function updateProgress(checked) {
      const total = ENTRIES.filter(e => includedCategories[e.type]).length;
      const percent = total > 0 ? (checked / total) * 100 : 0;
      document.getElementById('progressBar').style.width = percent + '%';
      document.getElementById('progressText').textContent = `${checked} / ${total}`;
    }

    document.getElementById('markAll').addEventListener('click', () => {
      const state = loadState();
      ENTRIES.forEach(entry => {
        if (includedCategories[entry.type]) {
          state[entry.id] = true;
        }
      });
      saveState(state);
      renderEntries();
    });

    document.getElementById('clearAll').addEventListener('click', () => {
      const state = loadState();
      ENTRIES.forEach(entry => {
        if (includedCategories[entry.type]) {
          delete state[entry.id];
        }
      });
      saveState(state);
      renderEntries();
    });

    document.getElementById('toggleFilms').addEventListener('click', () => {
      includedCategories.film = !includedCategories.film;
      document.getElementById('toggleFilms').classList.toggle('active');
      localStorage.setItem(categoryKey, JSON.stringify(includedCategories));
      renderEntries();
    });

    document.getElementById('toggleTV').addEventListener('click', () => {
      includedCategories.live = !includedCategories.live;
      document.getElementById('toggleTV').classList.toggle('active');
      localStorage.setItem(categoryKey, JSON.stringify(includedCategories));
      renderEntries();
    });

    document.getElementById('toggleAnimated').addEventListener('click', () => {
      includedCategories.animated = !includedCategories.animated;
      document.getElementById('toggleAnimated').classList.toggle('active');
      localStorage.setItem(categoryKey, JSON.stringify(includedCategories));
      renderEntries();
    });

    document.getElementById('markAll').addEventListener('click', () => {
      const state = loadState();
      ENTRIES.forEach(entry => {
        if (currentFilter === 'all' || entry.type === currentFilter) {
          state[entry.id] = true;
        }
      });
      saveState(state);
      renderEntries();
    });

    document.getElementById('clearAll').addEventListener('click', () => {
      const state = loadState();
      ENTRIES.forEach(entry => {
        if (currentFilter === 'all' || entry.type === currentFilter) {
          delete state[entry.id];
        }
      });
      saveState(state);
      renderEntries();
    });

    // Init
    if (!includedCategories.film) document.getElementById('toggleFilms').classList.remove('active');
    if (!includedCategories.live) document.getElementById('toggleTV').classList.remove('active');
    if (!includedCategories.animated) document.getElementById('toggleAnimated').classList.remove('active');
    renderEntries();
  </script>
</body>
</html>
